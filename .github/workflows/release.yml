name: Release

# Manual release workflow. Triggered via GitHub Actions UI ("Run workflow").
# 1. Checks for duplicate release (tag already exists -> fail)
# 2. Creates a git tag and GitHub release with auto-generated notes
# 3. Publishes to npm using OIDC trusted publishing (no NPM_TOKEN needed)
#
# Prerequisite: Configure npm trusted publishing by linking this GitHub repo
# to the npm package at https://www.npmjs.com/package/@sachitv/opencode-kilo-code-provider

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: full
        type: choice
        options:
          - draft
          - full

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Get version from package.json
        id: version
        run: |
          VERSION="v$(jq -r '.version' package.json)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: previoustag
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null) || tag=''
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ steps.version.outputs.version }}
          old-version: ${{ steps.previoustag.outputs.tag }}
          tag-prefix: 'v'
          skip-commit: true
          skip-tag: true
          git-push: false
          output-file: 'false'

      - name: Check for duplicate release
        run: |
          if git tag -l | grep -q "^${{ steps.version.outputs.version }}$"; then
            echo "::error::Tag ${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.clean_changelog }}
          draft: ${{ inputs.release_type == 'draft' }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks (typecheck + tests + build)
        run: bun run check

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org/

      - name: Update npm to latest
        run: npm install -g npm@latest

      # Uses npm OIDC trusted publishing — no NPM_TOKEN secret needed.
      # Requires linking this repo to the npm package in npm settings.
      - name: Publish to npm
        run: npm publish --provenance --access public
